<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <rect x="0" y="300" width="1200" height="330" fill="#d4a574"/>
  <rect x="0" y="280" width="1200" height="20" fill="#2ecc71"/>
  
  <!-- Sun -->
  <circle cx="1050" cy="120" r="60" fill="#f1c40f"/>
  
  <!-- Clouds -->
  <g fill="rgba(255,255,255,0.8)">
    <circle cx="200" cy="100" r="30"/>
    <circle cx="240" cy="90" r="40"/>
    <circle cx="280" cy="100" r="30"/>
    <circle cx="600" cy="150" r="25"/>
    <circle cx="635" cy="140" r="35"/>
    <circle cx="670" cy="150" r="25"/>
  </g>
  
  <!-- Lane lines -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="15,15">
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="90" font-weight="bold" fill="#f1c40f" stroke="#e74c3c" stroke-width="4">TAP RUNNER</text>
  
  <!-- Subtitle -->
  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#eee">Game Lari Multiplayer Online — Gratis!</text>
  
  <!-- Runner sprites (simplified) -->
  <g transform="translate(200, 370)">
    <rect x="15" y="0" width="30" height="25" fill="#ffe0bd" rx="3"/>
    <rect x="20" y="8" width="8" height="8" fill="#000"/>
    <rect x="32" y="8" width="8" height="8" fill="#000"/>
    <rect x="10" y="25" width="40" height="50" fill="#e74c3c"/>
    <rect x="0" y="30" width="12" height="30" fill="#e74c3c"/>
    <rect x="48" y="30" width="12" height="30" fill="#e74c3c"/>
    <rect x="12" y="75" width="15" height="35" fill="#333"/>
    <rect x="33" y="75" width="15" height="35" fill="#333"/>
  </g>
  
  <g transform="translate(450, 380)">
    <rect x="15" y="0" width="30" height="25" fill="#ffe0bd" rx="3"/>
    <rect x="20" y="8" width="8" height="8" fill="#000"/>
    <rect x="32" y="8" width="8" height="8" fill="#000"/>
    <rect x="10" y="25" width="40" height="50" fill="#3498db"/>
    <rect x="0" y="30" width="12" height="30" fill="#3498db"/>
    <rect x="48" y="30" width="12" height="30" fill="#3498db"/>
    <rect x="12" y="75" width="15" height="35" fill="#333"/>
    <rect x="33" y="75" width="15" height="35" fill="#333"/>
  </g>
  
  <g transform="translate(700, 390)">
    <rect x="15" y="0" width="30" height="25" fill="#ffe0bd" rx="3"/>
    <rect x="20" y="8" width="8" height="8" fill="#000"/>
    <rect x="32" y="8" width="8" height="8" fill="#000"/>
    <rect x="10" y="25" width="40" height="50" fill="#2ecc71"/>
    <rect x="0" y="30" width="12" height="30" fill="#2ecc71"/>
    <rect x="48" y="30" width="12" height="30" fill="#2ecc71"/>
    <rect x="12" y="75" width="15" height="35" fill="#333"/>
    <rect x="33" y="75" width="15" height="35" fill="#333"/>
  </g>
  
  <!-- Finish flag -->
  <rect x="950" y="310" width="60" height="8" fill="#fff"/>
  <rect x="950" y="326" width="60" height="8" fill="#000"/>
  <rect x="950" y="342" width="60" height="8" fill="#fff"/>
  <rect x="950" y="358" width="60" height="8" fill="#000"/>
</svg>